<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="./css/style.css"/>
    <link rel="stylesheet" type="text/css" href="./css/jsxgraph.css">
    <link href="./css/bootstrap.min.css" rel="stylesheet">
    <script src="./js/bootstrap.min.js"></script>
    <script src="./js/jsxgraphcore.js"></script>
    <title>Pecera - Simulador</title>
</head>
<body>
    <div id="contenedor" class="container">
        <!-- Scenario Tabs -->
        <div class="row mb-3">
            <div class="col-md">
                <div class="btn-group" role="group">
                    <button type="button" id="esc1-btn" class="btn btn-primary btn-sm">Escenario 1: Pecera</button>
                    <button type="button" id="esc2-btn" class="btn btn-secondary btn-sm">Escenario 2: Estanque Sustentable</button>
                </div>
            </div>
        </div>

        <!-- Canvas & Graph -->
        <div class="row">
            <div class="col-6" id="contenedorCanvas">
                <canvas id="canvas">Esto solo si no esta implementado</canvas>

                <!-- Escenario 1 Controls -->
                <div id="esc1-controls">
                    <div class="row">
                        <div class="col-md p-2">
                            <p>Temperatura: <span id="tempVal">23</span>&deg;C</p>
                            <div class="d-flex align-items-center">
                                <input type="range" min="0" max="50" value="23" id="temp" class="w-100">
                                <button id="playTemp" class="btn btn-success btn-sm ms-2">&#9654;</button>
                            </div>
                        </div>
                        <div class="col-md p-2">
                            <p>N&uacute;mero de peces: <span id="npecesVal">1</span></p>
                            <input type="range" min="0" max="20" value="1" id="npeces" class="w-100">
                        </div>
                        <div class="col-md p-2">
                            <p>Tama&ntilde;o de peces: <span id="tpecesVal">1</span> cm</p>
                            <input type="range" min="1" max="7" value="1" id="tpeces" class="w-100">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col pb-3">
                            <p><b>Saturaci&oacute;n de ox&iacute;geno (SO) = <span id="sat"></span></b></p>
                            <button id="point">graficar punto</button>
                            <button id="reset">Reiniciar</button>
                        </div>
                    </div>
                </div>

                <!-- Escenario 2 Controls -->
                <div id="esc2-controls" style="display:none;">
                    <div class="row">
                        <div class="col-md p-2">
                            <p>Voltaje: <span id="voltVal">25</span> V</p>
                            <input type="range" min="0" max="50" value="25" id="voltaje" class="w-100">
                        </div>
                        <div class="col-md p-2">
                            <p>Resistencia: 5 &Omega; (fija)</p>
                            <p>I = V / R = <span id="corrVal">0.00</span> A</p>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col pb-3">
                            <button id="reset-esc2">Reiniciar</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-6" id="contenedorGrafica">
                <div id="box" class="jxgbox"></div>
                <div id="box2" class="jxgbox" style="display:none;"></div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
