<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="./css/style.css"/>
    <link rel="stylesheet" type="text/css" href="./css/jsxgraph.css">
    <link href="./css/bootstrap.min.css" rel="stylesheet">
    <script src="./js/bootstrap.min.js"></script>
    <script src="./js/jsxgraphcore.js"></script>
    <title>Document</title>
</head>
<body>
    <div id="contenedor" class="container">
        <div class="row">
            <div class="col-md">
                <div class="row">
                    <div class="col-md p-2">
                        <p>Temperatura: <span id="tempVal">23</span>°C</p>
                        <div class="d-flex align-items-center">
                            <input type="range" min="0" max="50" value="23" id="temp" class="w-100">
                            <button id="playTemp" class="btn btn-success btn-sm ms-2">▶</button>
                        </div>
                    </div>
                    <div class="col-md p-2">
                        <p>Número de peces: <span id="npecesVal">1</span></p>
                        <input type="range" min="0" max="20" value="1" id="npeces" class="w-100">
                    </div>
                    <div class="col-md p-2">
                        <p>Tamaño de peces: <span id="tpecesVal">1</span> cm</p>
                        <input type="range" min="1" max="7" value="1" id="tpeces" class="w-100">
                    </div>
                </div>
                <div class="row">
                    <div class="col pb-3">
                        <p><b>Saturación de oxígeno (SO) = <span id="sat"></span></b></p> 
                        <button id="point">graficar punto</button>
                        <button id="reset">Reiniciar</button>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md">
                        <canvas id="canvas">Esto solo si no esta implementado</canvas>
                    </div>
                </div>
            </div>
            <div class="col-md">
                <div id="box" class="jxgbox"></div>
            </div>
        </div>
        
        

        
        
        <script src="js/script.js"></script>
    </div>   
</body>
</html>
