<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="./css/style.css"/>
    <link rel="stylesheet" type="text/css" href="./css/jsxgraph.css">
    <link href="./css/bootstrap.min.css" rel="stylesheet">
    <script src="./js/bootstrap.min.js"></script>
    <script src="./js/jsxgraphcore.js"></script>
    <title>Pecera - Simulador</title>
</head>
<body>
    <div id="contenedor" class="container">
        <!-- Scenario Tabs -->
        <div class="row mb-1">
            <div class="col-md">
                <div class="btn-group" role="group">
                    <button type="button" id="esc1-btn" class="btn btn-primary btn-sm">Pecera</button>
                    <button type="button" id="esc3-btn" class="btn btn-secondary btn-sm">Pecera + Litros</button>
                    <button type="button" id="esc2-btn" class="btn btn-secondary btn-sm">Estanque Sustentable</button>
                    <button type="button" id="esc4-btn" class="btn btn-secondary btn-sm">Estanque + Gráfica</button>
                </div>
            </div>
        </div>

        <!-- Canvas & Graph -->
        <div class="row">
            <div class="col-12 col-sm-6" id="contenedorCanvas">
                <canvas id="canvas">Esto solo si no esta implementado</canvas>

                <!-- Escenario 1 Controls -->
                <div id="esc1-controls">
                    <div class="row">
                        <div class="col-md py-1">
                            <p class="mb-1">Temperatura: <span id="tempVal">23</span>&deg;C</p>
                            <div class="d-flex align-items-center">
                                <input type="range" min="0" max="50" value="23" id="temp" class="w-100">
                                <button id="playTemp" class="btn btn-success btn-sm">&#9654;</button>
                            </div>
                        </div>
                        <div class="col-md py-1">
                            <p class="mb-1">N&uacute;mero de peces: <span id="npecesVal">1</span></p>
                            <input type="range" min="0" max="20" value="1" id="npeces" class="w-100">
                        </div>
                        <div class="col-md py-1">
                            <p class="mb-1">Tama&ntilde;o de peces: <span id="tpecesVal">1</span> cm</p>
                            <input type="range" min="1" max="7" value="1" id="tpeces" class="w-100">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col pb-1">
                            <div id="la-section" style="display:none;">
                                <div class="form-check mb-2">
                                    <input class="form-check-input" type="checkbox" id="checkLA">
                                    <label class="form-check-label" for="checkLA">Litros de agua necesaria</label>
                                </div>
                                <div id="dataLA" style="display:none">
                                    <p><b>Litros de agua (LA) = <span id="LA"></span></b></p>
                                </div>
                                <button id="pointLA" class="btn btn-info btn-sm" disabled>graficar punto LA</button>
                            </div>
                            <p class="mb-1"><b>Saturaci&oacute;n de ox&iacute;geno (SO) = <span id="sat"></span></b></p>
                            <div class="d-flex justify-content-center gap-2 flex-wrap">
                                <button id="point" class="btn btn-info btn-sm">graficar punto</button>
                                <button id="reset" class="btn btn-secondary btn-sm">Reiniciar</button>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Escenario 2 & 4 Controls -->
                <div id="esc2-controls" style="display:none;">
                    <div class="row">
                        <div class="col-md p-2">
                            <p>V = <span id="voltVal">25</span> V &nbsp;|&nbsp; I = <span id="corrVal">5.00</span> A</p>
                            <input type="range" min="0" max="50" value="25" id="voltaje" class="w-100">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col pb-3">
                            <div class="d-flex justify-content-center">
                                <button id="reset-esc2" class="btn btn-secondary btn-sm">Reiniciar</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-sm-6 d-flex flex-column" id="contenedorGrafica">
                <div id="box" class="jxgbox flex-grow-1"></div>
                <div id="box4" class="jxgbox flex-grow-1" style="display:none;"></div>
            </div>
        </div>
    </div>

    <div id="navWrap">
        <button id="btnAtras" class="btn btn-secondary btn-lg">← Atrás</button>
        <button id="btnContinuar" class="btn btn-primary btn-lg">Continuar →</button>
    </div>

    <div class="modal fade" id="codigoModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Código Secreto</h5>
                </div>
                <div class="modal-body">
                    <p>Ingresa el código secreto para continuar:</p>
                    <input type="text" id="codigoInput" class="form-control" placeholder="Ingresa el código secreto">
                    <div id="codigoError" class="text-danger mt-2" style="display:none;">Código incorrecto</div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" id="confirmarCodigo" class="btn btn-primary">Confirmar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
